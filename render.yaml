# Blueprint na raiz do repo (Render encontra automaticamente)
services:
  - type: web
    name: chamaroma-anapaula-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
